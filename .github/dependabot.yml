version: 2

updates:
  # pnpm workspace: a single root pnpm-lock.yaml is the only lockfile, so we
  # scan from "/" only. Listing per-package directories would cause Dependabot
  # to open overlapping PRs that race on the same lockfile.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 8
    versioning-strategy: "increase-if-necessary"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    # Two groups (one production, one development) so each weekly run produces
    # at most two lockfile-touching PRs. Major bumps are kept in the same group
    # rather than split off, because splitting causes parallel PRs that all
    # conflict on pnpm-lock.yaml and trigger an endless rebase loop.
    # NOTE: do NOT add `group-by: dependency-name` here — that option is for
    # cross-directory monorepos and forces one PR per dependency, defeating
    # the whole point of grouping.
    # Group order matters: Dependabot matches groups top-to-bottom and the
    # first match wins. The `prisma` group must come BEFORE the type-based
    # groups so it captures both `prisma` (devDep) and `@prisma/client` (dep)
    # together — they share a major version contract and must be bumped as a
    # pair, otherwise `prisma generate` fails with a missing runtime module.
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/client"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "05:00"
      timezone: "UTC"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "05:15"
      timezone: "UTC"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build(deps)"
    ignore:
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
    groups:
      docker-base-images:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "05:30"
      timezone: "UTC"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build(deps)"
    groups:
      compose-images:
        patterns:
          - "*"