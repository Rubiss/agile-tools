x-agile-tools-runtime: &agile-tools-runtime
  build:
    context: .
    dockerfile: Dockerfile
    args:
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
      COREPACK_NPM_REGISTRY: ${COREPACK_NPM_REGISTRY:-}
      NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-}
  image: agile-tools:local
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agile_tools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agile_tools"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    <<: *agile-tools-runtime
    profiles: ['runtime']
    command: ['web']
    environment:
      AGILE_TOOLS_ROLE: web
      ALLOW_LOOPBACK_HTTP_BYPASS: ${ALLOW_LOOPBACK_HTTP_BYPASS:-true}
      ALLOW_LOCAL_BOOTSTRAP: ${ALLOW_LOCAL_BOOTSTRAP:-true}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agile_tools
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

  bootstrap:
    <<: *agile-tools-runtime
    profiles: ['bootstrap']
    command: ['bootstrap']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agile_tools
      NODE_ENV: production
    restart: 'no'

  worker:
    <<: *agile-tools-runtime
    profiles: ['runtime']
    command: ['worker']
    environment:
      AGILE_TOOLS_ROLE: worker
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agile_tools
      METRICS_HOST: 0.0.0.0
      METRICS_PORT: ${WORKER_METRICS_PORT:-9464}
      NODE_ENV: production
    ports:
      - "${WORKER_METRICS_PORT:-9464}:${WORKER_METRICS_PORT:-9464}"

volumes:
  postgres_data:
